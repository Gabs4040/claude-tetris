name: Auto-label Issues

on:
  issues:
    types: [opened]

jobs:
  label-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Label issue based on content
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const content = `${title} ${body}`;

            const labels = ['claude-code'];

            // Check for bug-related keywords
            if (content.includes('bug') || content.includes('error') || content.includes('broken') || content.includes('crash')) {
              labels.push('bug');
            }

            // Check for feature-related keywords
            if (content.includes('feature') || content.includes('enhancement') || content.includes('request') || content.includes('add')) {
              labels.push('feature');
            }

            // Check for documentation-related keywords
            if (content.includes('doc') || content.includes('documentation') || content.includes('readme') || content.includes('guide')) {
              labels.push('documentation');
            }

            // If no specific labels matched, add 'feature' as default
            if (labels.length === 1) {
              labels.push('feature');
            }

            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

            console.log(`Added labels: ${labels.join(', ')}`);
