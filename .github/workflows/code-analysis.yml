name: Claude Code Analysis & Implementation

on:
  issues:
    types: [labeled]

jobs:
  claude-implementation:
    if: github.event.label.name == 'claude-code'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            console.log('Issue Title:', issue.title);
            console.log('Issue Body:', issue.body);
            core.setOutput('title', issue.title);
            core.setOutput('body', issue.body);
            core.setOutput('number', issue.number);

      - name: Run Claude Code Analysis & Fix
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el siguiente issue y realiza los cambios solicitados:

            **Título:** ${{ steps.issue.outputs.title }}

            **Descripción:**
            ${{ steps.issue.outputs.body }}

            Por favor:
            1. Comprende claramente qué se solicita en el issue
            2. Analiza el código actual del proyecto
            3. Realiza los cambios necesarios en los archivos
            4. Asegúrate de que funcione correctamente
            5. Crea un commit con los cambios realizados

            Si necesitas hacer cambios, hazlos directamente en los archivos del repositorio.
