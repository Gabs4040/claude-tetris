name: Code Analysis

on:
  issues:
    types: [labeled]

jobs:
  analyze-code:
    if: github.event.label.name == 'claude-code'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Analyze code quality
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let analysis = '## 📊 Code Analysis Report\n\n';

            // Analyze JavaScript file
            const gameJsPath = 'game.js';
            if (fs.existsSync(gameJsPath)) {
              const gameJs = fs.readFileSync(gameJsPath, 'utf8');
              const lines = gameJs.split('\n');
              const jsSize = gameJs.length;

              analysis += `### 📁 game.js\n`;
              analysis += `- **Lines of code:** ${lines.length}\n`;
              analysis += `- **File size:** ${(jsSize / 1024).toFixed(2)} KB\n`;
              analysis += `- **Uses strict mode:** ${gameJs.includes("'use strict'") ? '✅ Yes' : '❌ No'}\n`;
              analysis += `- **Global variables:** ${(gameJs.match(/^(let|const|var)\s+/gm) || []).length}\n\n`;

              // Check for potential issues
              const issues = [];
              if (gameJs.match(/console\.(log|error|warn)/g)) {
                issues.push('⚠️ Contains console statements (remove in production)');
              }
              if (gameJs.match(/eval\(/g)) {
                issues.push('🔴 Contains eval() (security risk)');
              }
              if (gameJs.match(/var\s+/g)) {
                issues.push('⚠️ Uses var instead of let/const');
              }
              if (!gameJs.includes("'use strict'")) {
                issues.push('⚠️ Missing strict mode');
              }

              if (issues.length > 0) {
                analysis += `### ⚠️ Potential Issues\n`;
                issues.forEach(issue => {
                  analysis += `- ${issue}\n`;
                });
                analysis += '\n';
              }
            }

            // Analyze HTML file
            const indexPath = 'index.html';
            if (fs.existsSync(indexPath)) {
              const html = fs.readFileSync(indexPath, 'utf8');
              analysis += `### 📄 index.html\n`;
              analysis += `- **File size:** ${(html.length / 1024).toFixed(2)} KB\n`;
              analysis += `- **Has meta viewport:** ${html.includes('viewport') ? '✅ Yes' : '❌ No'}\n`;
              analysis += `- **Has title:** ${html.includes('<title>') ? '✅ Yes' : '❌ No'}\n`;
              analysis += `- **Canvas elements:** ${(html.match(/<canvas/g) || []).length}\n\n`;
            }

            // Analyze CSS file
            const cssPath = 'style.css';
            if (fs.existsSync(cssPath)) {
              const css = fs.readFileSync(cssPath, 'utf8');
              analysis += `### 🎨 style.css\n`;
              analysis += `- **File size:** ${(css.length / 1024).toFixed(2)} KB\n`;
              analysis += `- **CSS rules:** ${(css.match(/\{/g) || []).length}\n`;
              analysis += `- **Uses CSS variables:** ${css.includes('--') ? '✅ Yes' : '❌ No'}\n\n`;
            }

            analysis += `### ✨ Summary\n`;
            analysis += `- Project structure: ✅ Clean (3 files)\n`;
            analysis += `- No build step required: ✅ Good for simplicity\n`;
            analysis += `- No external dependencies: ✅ Excellent\n`;

            // Post comment on issue
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: analysis
            });

            console.log('Analysis complete and posted to issue');
