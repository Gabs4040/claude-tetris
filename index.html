<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="panel-section hidden" id="combo-section">
          <span class="label">COMBO</span>
          <span class="value combo-value" id="combo">x1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <!-- Game-over / pause overlay -->
    <div id="overlay" class="overlay hidden" data-mode="gameover">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <!-- Name entry (shown only when score qualifies) -->
        <div id="name-section" class="hidden">
          <p class="name-prompt">¡Récord! Tu nombre:</p>
          <div class="name-row">
            <input id="name-input" type="text" maxlength="12" placeholder="AAA" autocomplete="off" />
            <button id="name-save-btn" class="action-btn">Guardar</button>
          </div>
        </div>

        <!-- Top-5 table -->
        <div id="scores-section" class="scores-section">
          <p class="scores-title">Récords</p>
          <table class="scores-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Puntos</th>
                <th>Stats</th>
              </tr>
            </thead>
            <tbody id="scores-table-body"></tbody>
          </table>
          <button id="reset-records-game" class="reset-btn">Resetear récords</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <!-- Start screen overlay -->
    <div id="start-overlay" class="overlay hidden">
      <div class="overlay-box start-box">
        <p class="start-title">TETRIS</p>

        <div class="scores-section">
          <p class="scores-title">Récords</p>
          <table class="scores-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Puntos</th>
                <th>Stats</th>
              </tr>
            </thead>
            <tbody id="start-scores-body"></tbody>
          </table>
          <button id="reset-records-start" class="reset-btn">Resetear récords</button>
        </div>

        <button id="play-btn" class="play-btn">Jugar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
